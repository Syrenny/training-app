name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5

      - name: Run backend tests
        working-directory: backend
        run: |
          uv sync --frozen
          uv run pytest tests -q

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    needs: test
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Write compose env file
        run: |
          mkdir -p /opt/training-app/db
          cat > .env.production <<EOF
          APP_DB_DIR=/opt/training-app/db
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          TELEGRAM_WEBAPP_URL=${{ secrets.TELEGRAM_WEBAPP_URL }}
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          DEBUG=false
          EOF

      - name: Build and restart stack
        run: |
          docker compose -f compose.prod.yaml --env-file .env.production up -d --build --remove-orphans
