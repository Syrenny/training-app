services:
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    image: ${WEB_IMAGE:-training-app-web:local}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/app/docker/web-entrypoint.sh"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-me}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DB_DIR: /app/db
      DEBUG: ${DEBUG:-false}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    volumes:
      - ${APP_DB_DIR:-./data/db}:/app/db
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1', 8000), 2); s.close()",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    image: ${BOT_IMAGE:-training-app-bot:local}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/app/docker/bot-entrypoint.sh"]
    depends_on:
      web:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-me}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DB_DIR: /app/db
      DEBUG: ${DEBUG:-false}
    volumes:
      - ${APP_DB_DIR:-./data/db}:/app/db

  frontend-static:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_STATIC_IMAGE:-training-app-frontend-static:local}
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - ${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_PORT:-8000}:80
